<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>CURRENCY CONVERTER</h2>

    <form id="converterForm">
        
        <div class="amount">
            <p>Enter amount</p>
            <input id="amount" value="1" type="number">
        </div>

        <div class="dropdown">
            
            <div class="from">
                <p>From</p>
                <div class="select-container">
                    <img id="fromFlag" src="https://flagsapi.com/US/flat/64.png">
                    <select id="fromCurrency"></select>
                </div>
            </div>

            <div class="to">
                <p>To</p>
                <div class="select-container">
                    <img id="toFlag" src="https://flagsapi.com/IN/flat/64.png">
                    <select id="toCurrency"></select>
                </div>
            </div>

        </div>

        <div class="msg" id="result">
            1 USD = 80 INR
        </div>

        <button type="button" id="convertBtn">
            GET EXCHANGE RATE
        </button>

    </form>
</div>

<script src="codes.js"></script>
<script src="app.js"></script>

</body>
</html>
